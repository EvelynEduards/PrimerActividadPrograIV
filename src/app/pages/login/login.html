<div class="auth-page">
  <div class="auth-card">
    <div class="auth-decoration"></div>

    <div class="auth-content">
      <h1>Iniciá sesión</h1>
      <p class="auth-subtitle">
        ¿No tenes cuenta?
        <a routerLink="/registro">Registrate</a>
      </p>

      <div class="input-group">
        <input type="text" placeholder="Ingresá tu email" />
      </div>

      <div class="input-group password-group">
        <input type="password" placeholder="Ingresá tu contraseña" />
      </div>

      <div class="auth-action">
        <button type="button" class="auth-button" routerLink="/error">
        Iniciar sesión
        </button>
      </div>

      <div class="social-login">
        <span class="social-circle">f</span>
        <span class="social-circle">G</span>
        <span class="social-circle">t</span>
      </div>
    </div>
  </div>
</div>
