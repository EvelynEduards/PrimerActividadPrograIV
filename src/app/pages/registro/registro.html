<div class="auth-page">
  <div class="auth-card">
    <div class="auth-decoration"></div>

    <div class="auth-content">
      <h1>Crear cuenta</h1>
      <p class="auth-subtitle">
        ¿Tenes una cuenta?
        <a routerLink="/login">Iniciá sesión</a>
      </p>

      <div class="input-group">
        <input type="text" placeholder="Nombre" />
      </div>

      <div class="input-group">
        <input type="text" placeholder="Tu email o número de telefono" />
      </div>

      <div class="input-group">
        <input type="password" placeholder="Contraseña" />
      </div>

      <div class="auth-action">
        <button type="button" class="auth-button" routerLink="/error">
        Login
        </button>
      </div>
    </div>
  </div>
</div>
